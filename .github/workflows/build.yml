name: Map of Pi Build

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: Quality Assurance (Runs in parallel with Build)
  qa:
    name: 🛡️ Quality Assurance
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js & Cache
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: 'npm'

      - name: 🛠️ Optimized Dependency Install
        run: npm ci

      - name: 🔍 Execute Linting Checks
        run: npm run lint
        
      - name: 🧪 Execute Unit Tests
        run: npm run test -- --passWithNoTests --ci --maxWorkers=2

  # Job 2: Production Build
  build:
    name: 🏗️ Production Build
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js & Cache
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: 'npm'

      - name: 🛠️ Optimized Dependency Install
        run: npm ci
          
      - name: 🏗️ Compile Frontend Application
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          CI: false
