name: Map of Pi Build

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    name: 📦 Setup & Foundation
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Initialize Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: 'npm'

      - name: 🛠️ Install Dependencies
        run: npm ci

      # Uploading both node_modules AND the .next folder if exists for maximum consistency
      - name: 📤 Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: node-dependencies
          path: |
            node_modules/
            package-lock.json
          retention-days: 1

  qa:
    name: 🛡️ Quality Assurance
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
      
      - name: 📥 Retrieve Dependency Artifacts
        uses: actions/download-artifact@v4
        with:
          name: node-dependencies
          path: .

      # Using 'npx' ensures the local 'next' binary is found even if path hashing fails
      - name: 🔍 Execute Linting Checks
        run: npx next lint
        
      - name: 🧪 Execute Unit Tests
        run: npm run test -- --passWithNoTests --ci --maxWorkers=2

  build:
    name: 🏗️ Production Build
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          
      - name: 📥 Retrieve Dependency Artifacts
        uses: actions/download-artifact@v4
        with:
          name: node-dependencies
          path: .
          
      # Direct execution via npx to eliminate "sh: 1: next: not found" forever
      - name: 🏗️ Compile Frontend Application
        run: npx next build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          CI: false
