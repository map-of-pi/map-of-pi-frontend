name: Map of Pi Build

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

# Management of concurrent runs to optimize CI resources and prevent outdated builds
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: Quality Assurance (The Security Gate)
  # This job acts as a rigorous filter, ensuring code integrity before any build resources are consumed.
  qa:
    name: 🛡️ Quality Assurance
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js & Cache
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: 'npm'

      - name: 🛠️ Optimized Dependency Install
        # Using 'npm ci' for reliable, reproducible builds in the CI environment
        run: npm ci

      - name: 🔍 Execute Linting Checks
        # Enforcing strict code standards and leveraging Next.js built-in caching for rapid feedback
        run: npm run lint
        
      - name: 🧪 Execute Unit Tests
        # Fail-fast approach: Optimized with resource limits to prevent memory overhead
        run: npm run test -- --passWithNoTests --ci --maxWorkers=2

  # Job 2: Production Build (Gated by QA)
  # This stage is architected to execute ONLY upon 100% verification of the QA suite.
  build:
    name: 🏗️ Production Build
    needs: qa # The "Quality Gate": Ensures the build only starts if QA (Lint/Tests) passes
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js & Cache
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: 'npm'

      - name: 🛠️ Optimized Dependency Install
        run: npm ci
          
      - name: 🏗️ Compile Frontend Application
        # Building the production artifact with maximum transparency.
        # Strict error handling is enforced by removing 'CI: false' to prevent silent failures.
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
