name: Map of Pi Build

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: Install & Cache (The Foundation)
  setup:
    name: 📦 Setup & Cache
    runs-on: ubuntu-latest
    outputs:
      cache-hit: ${{ steps.cache-npm.outputs.cache-hit }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

  # Job 2: Quality Assurance (Runs in parallel with Build)
  qa:
    name: 🛡️ Quality Assurance
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: 'npm'
      
      - name: Run Linting
        run: npm run lint
        
      - name: Run Unit Tests
        run: npm run test -- --passWithNoTests --ci --maxWorkers=2

  # Job 3: Production Build
  build:
    name: 🏗️ Production Build
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: 'npm'
          
      - name: Build Frontend Application
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          CI: false
