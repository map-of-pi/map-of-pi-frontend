name: Map of Pi Build

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

# Prevents multiple concurrent builds on the same branch to optimize resource usage
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: Initialize the environment and establish the dependency base
  setup:
    name: 📦 Setup & Foundation
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Initialize Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: 'npm'

      - name: 🛠️ Clean Install Dependencies
        run: npm ci

      # Persist node_modules to be shared across parallel execution jobs
      # This resolves the 'command not found' issue in isolated runners
      - name: 📤 Upload Dependency Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: node-dependencies
          path: node_modules/
          retention-days: 1

  # Job 2: Static analysis and Unit testing
  qa:
    name: 🛡️ Quality Assurance
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
      
      - name: 📥 Retrieve Dependency Artifacts
        uses: actions/download-artifact@v4
        with:
          name: node-dependencies
          path: node_modules/

      - name: 🔍 Execute Linting Checks
        run: npm run lint
        
      - name: 🧪 Execute Unit Tests
        run: npm run test -- --passWithNoTests --ci --maxWorkers=2

  # Job 3: Production Build Generation
  build:
    name: 🏗️ Production Build
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          
      - name: 📥 Retrieve Dependency Artifacts
        uses: actions/download-artifact@v4
        with:
          name: node-dependencies
          path: node_modules/
          
      - name: 🏗️ Compile Frontend Application
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          CI: false # Maintains build stability even with non-critical warnings
