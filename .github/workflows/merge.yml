name: Map of Pi Merge

on:
  # Triggered automatically once the "Map of Pi Build" workflow finishes its execution
  workflow_run:
    workflows: ["Map of Pi Build"]
    types:
      - completed

  # Support for manual triggers via the GitHub Actions dashboard
  workflow_dispatch:

jobs:
  merge:
    name: 🔀 Automated Integration
    runs-on: ubuntu-latest
    # Safety Gate: Executes ONLY if the build pipeline succeeded on the 'dev' branch
    # This ensures that no code reaches 'main' without passing the Quality Gate.
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'dev' }}

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🚀 Initialize Pull Request to Main
        # Utilizing a stable and production-ready version for automated branch synchronization
        uses: repo-sync/pull-request@v2.12.1 
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          source_branch: "dev"
          destination_branch: "main"
          pr_title: "🚀 [Automated] Release: Merge dev into main"
          pr_body: |
            ## 🤖 Map of Pi Automated Release System
            This Pull Request was autonomously generated following a **successful** execution of the full CI/CD pipeline.

            ### 🛡️ Integrity & Compliance Report:
            - **Pipeline Status:** ✅ **GATED PASS** (QA & Production Build Verified)
            - **Source Origin:** `${{ github.event.workflow_run.head_branch }}`
            - **Sync Direction:** `dev` ➔ `main`
            - **Verification:** 100% Linting, Unit Testing, and Frontend Compilation successful.

            ### 🏷️ State Indicators:
            - `auto-pr`: System-generated integration.
            - `deployment`: This label acts as a **State Indicator** to trigger downstream notification webhooks (Discord/Slack) and signal readiness for Mainnet deployment.

            ---
            *Architected by Map of Pi CI Engine | Zero-Regression Policy Enforced.*
          pr_label: "auto-pr,deployment"
