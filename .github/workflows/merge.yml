name: Map of Pi Merge

# Controls when the workflow will execute
on:
  # Triggers the workflow when "Map of Pi Build" successfully completes
  workflow_run:
    workflows: ["Map of Pi Build"]
    types:
      - completed

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  merge:
    name: 🔀 Merge
    runs-on: ubuntu-latest
    # Added explicit success check to ensure consistency with the build status
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'dev' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Updated to v4 for consistency and speed

      - name: Merge dev to main
        # Keeping the stable v2 for automated pull requests
        uses: repo-sync/pull-request@v2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          source_branch: "dev"
          destination_branch: "main"
          pr_title: "Automated PR to merge dev to main"
          pr_body: ":robot: Automated PR from **dev** to **main**; see commits."
          pr_label: "auto-pr"
