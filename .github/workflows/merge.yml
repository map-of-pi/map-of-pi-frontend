name: Map of Pi Merge

on:
  # Triggered automatically once the "Map of Pi Build" workflow finishes its execution
  workflow_run:
    workflows: ["Map of Pi Build"]
    types:
      - completed

  # Support for manual triggers via the GitHub Actions dashboard
  workflow_dispatch:

jobs:
  merge:
    name: 🔀 Automated Integration
    runs-on: ubuntu-latest
    # Safety Gate: Executes ONLY if the build pipeline succeeded on the 'dev' branch
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'dev' }}

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🚀 Initialize Pull Request to Main
        # Utilizing a stable and production-ready version for automated branch synchronization
        uses: repo-sync/pull-request@v2.12.1 
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          source_branch: "dev"
          destination_branch: "main"
          pr_title: "🚀 [Automated] Release: Merge dev into main"
          pr_body: |
            ## :robot: Automated Release System
            This Pull Request was triggered by a successful execution of the **Map of Pi Build** pipeline.
            
            ### ✅ Integrity Report:
            - **Source:** `dev` branch.
            - **Validation:** All Quality Assurance (QA) and Production Build stages passed successfully.
            - **Scope:** Synchronizing the latest verified features with the production environment.
            
            *Automated by Map of Pi CI Engine.*
          pr_label: "auto-pr,deployment"
