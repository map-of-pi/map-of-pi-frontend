<div
  id="map"
  leaflet
  [leafletOptions]="options"
  (leafletMapReady)="onMapReady($event)">
  @if (layer) {
    <div [leafletLayer]="layer"></div>
  }

<!-- Save Button Element -->
<div *ngIf="popupDismissed" class="map-controls__item">
  <button class="map-controls__button" (click)="saveCenter()"> 
    {{ 'MAP.BUTTONS.SAVE_CENTER' | translate }}
  </button>
</div>

<!-- Popup Message Container -->
<div *ngIf="showPopup" class="popup-message" role="alertdialog" aria-modal="true" aria-labelledby="popupMessageText" tabindex="-1">
  <img src="assets/favicon/favicon-32x32.png" loading="lazy" class="popup-message__logo" alt="{{ 'CORE.APP_NAME' | translate }}">
  <p id="popupMessageText" class="popup-message__text">
    <span class="popup-message__text--welcome">{{ 'MAP.WELCOME_MESSAGE' | translate }}</span>
    {{ typedMessage }}
  </p>
  <button (click)="closePopup()" class="popup-message__button--confirm">
    {{ 'MAP.BUTTONS.GOT_IT' | translate }}
  </button> 
</div>
