<div
  id="map"
  leaflet
  [leafletOptions]="options"
  (leafletMapReady)="onMapReady($event)">
  @if (layer) {
    <div [leafletLayer]="layer"></div>
  }

  <!-- Save Button Element -->
  <div class="map-controls__item">
    <button class="map-controls__button" (click)="saveCenter()">Save Center</button>
  </div>
</div>
